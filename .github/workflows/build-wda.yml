name: Build WebDriverAgent

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build WebDriverAgent
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64

      - name: Package WDA
        run: |
          WDA_PATH=$(find ./build -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          echo "Found WDA at: $WDA_PATH"
          if [ -z "$WDA_PATH" ]; then
            echo "WDA app not found, listing build directory:"
            find ./build -name "*.app" -type d
            exit 1
          fi

          echo "Frameworks included:"
          ls -la "$WDA_PATH/Frameworks/" || echo "No frameworks dir"

          echo "Runner bundle ID:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$WDA_PATH/Info.plist"

          mkdir -p Payload
          cp -r "$WDA_PATH" Payload/
          zip -r WebDriverAgentRunner.ipa Payload/
          ls -la WebDriverAgentRunner.ipa

      - name: Upload WDA IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: WebDriverAgentRunner.ipa
          retention-days: 30
